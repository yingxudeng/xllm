syntax = "proto3";

option go_package = "jd.com/jd-infer/xllm;xllm";
package xllm.proto;
option cc_enable_arenas = true;
option cc_generic_services = true;

import "completion.proto";
import "sample.proto";
import "chat.proto";
import "embedding.proto";
import "image_generation.proto";
import "audio_generation.proto";
import "video_generation.proto";
import "rerank.proto";
import "models.proto";
import "anthropic.proto";
import "common.proto";

message HttpRequest {
};

message HttpResponse {
};

message MasterInfos {
  string model_id = 1;
  string model_path = 2;
  string master_node_addr = 3;
  MasterStatus master_status = 4;
  repeated string remote_addrs = 5;
  int32 nnodes = 6;
  int32 dp_size = 7;
  // Per-remote-addr weight segments (index matches remote_addrs)
  repeated MasterWeightSegmentList src_weight_segments = 8;
}

// A single weight segment for master wakeup
message MasterWeightSegment {
  uint64 offset = 1;
  uint64 size = 2;
}

// List of weight segments for one remote source
message MasterWeightSegmentList {
  repeated MasterWeightSegment segments = 1;
}

message P2PLinkRequest {
  string model_id = 1;
  repeated string remote_addrs = 2;
}

// Async RL training support: pause/resume
message PauseRequest {
  // How to handle in-flight requests: "keep" (default), "abort", or "wait".
  //  - keep:  preempt running requests, free KV cache, re-prefill on resume.
  //  - abort: cancel running requests; clients must retry.
  //  - wait:  let running requests finish naturally, then pause.
  string mode = 1;
}

message PauseResponse {
  string status = 1;  // "paused" or "error: ..."
}

message ResumeRequest {
  // Empty for now - simple resume semantics
}

message ResumeResponse {
  string status = 1;  // "running" or "error: ..."
}

service XllmAPIService {
  rpc Completions (CompletionRequest) returns (CompletionResponse);
  rpc CompletionsHttp (HttpRequest) returns (HttpResponse);

  rpc Sample (SampleRequest) returns (SampleResponse);
  rpc SampleHttp (HttpRequest) returns (HttpResponse);

  rpc ChatCompletions (ChatRequest) returns (ChatResponse);
  rpc ChatCompletionsHttp (HttpRequest) returns (HttpResponse);

  rpc Embeddings (EmbeddingRequest) returns (EmbeddingResponse);
  rpc EmbeddingsHttp (HttpRequest) returns (HttpResponse);

  rpc ImageGeneration(ImageGenerationRequest) returns (ImageGenerationResponse);
  rpc ImageGenerationHttp(HttpRequest) returns (HttpResponse);

  rpc AudioGeneration(AudioGenerationRequest) returns (AudioGenerationResponse);
  rpc AudioGenerationHttp(HttpRequest) returns (HttpResponse);
  
  rpc VideoGeneration(VideoGenerationRequest) returns (VideoGenerationResponse);
  rpc VideoGenerationHttp(HttpRequest) returns (HttpResponse);

  rpc Rerank (RerankRequest) returns (RerankResponse);
  rpc RerankHttp (HttpRequest) returns (HttpResponse);
  
  rpc Models (ModelListRequest) returns (ModelListResponse);
  rpc ModelsHttp (HttpRequest) returns (HttpResponse);

  rpc ModelVersionsHttp (HttpRequest) returns (HttpResponse);

  rpc AnthropicMessagesHttp (HttpRequest) returns (HttpResponse);

  rpc ForkMaster (MasterInfos) returns (Status);
  rpc ForkMasterHttp (HttpRequest) returns (HttpResponse);
  
  rpc Sleep (MasterInfos) returns (Status);
  rpc SleepHttp (HttpRequest) returns (HttpResponse);

  rpc Wakeup (MasterInfos) returns (Status);
  rpc WakeupHttp (HttpRequest) returns (HttpResponse);

  rpc StartProfileHttp (HttpRequest) returns (HttpResponse);
  rpc StopProfileHttp (HttpRequest) returns (HttpResponse);

  rpc LinkP2P (P2PLinkRequest) returns (Status);
  rpc LinkP2PHttp (HttpRequest) returns (HttpResponse);

  rpc UnlinkP2P (P2PLinkRequest) returns (Status);
  rpc UnlinkP2PHttp (HttpRequest) returns (HttpResponse);

  // Async RL training support: pause/resume
  rpc Pause (PauseRequest) returns (PauseResponse);
  rpc PauseHttp (HttpRequest) returns (HttpResponse);
  rpc Resume (ResumeRequest) returns (ResumeResponse);
  rpc ResumeHttp (HttpRequest) returns (HttpResponse);
}; 
